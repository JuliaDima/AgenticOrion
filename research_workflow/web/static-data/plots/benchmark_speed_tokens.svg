<text class="val" x="599.7" y="285.8" text-anchor="middle">7.67</text>
<text class="lbl" x="569.0" y="450.0" text-anchor="middle">Tokens / 1k</text>
<text class="ylbl" transform="translate(13,248.0) rotate(-90)" text-anchor="middle">Lower is better for both groups  (error bars = 1σ across repeated runs)</text>
