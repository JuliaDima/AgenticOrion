<rect x="178.3" y="330.1" width="52.0" height="101.9" rx="4" fill="#0d9488" opacity="0.92"/>
<text class="val" x="204.3" y="325.1" text-anchor="middle">5.54</text>
<rect x="239.7" y="312.5" width="52.0" height="119.5" rx="4" fill="#7c3aed" opacity="0.92"/>
<text class="val" x="265.7" y="307.5" text-anchor="middle">6.49</text>
<text class="lbl" x="235.0" y="450.0" text-anchor="middle">Wall time / 10s</text>
<rect x="512.3" y="175.3" width="52.0" height="256.7" rx="4" fill="#0d9488" opacity="0.92"/>
