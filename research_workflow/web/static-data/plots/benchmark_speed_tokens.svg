<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" role="img">
<style>text{font-family:'Inter',system-ui,Arial,sans-serif;fill:#1e293b}.dim{fill:#94a3b8}.grid{stroke:#e2e8f0;stroke-width:1}.axis{stroke:#cbd5e1;stroke-width:1.5}.val{font-size:11px;font-weight:600;fill:#475569}.lbl{font-size:12px;fill:#64748b}.title{font-size:17px;font-weight:700;fill:#0f172a}.ylbl{font-size:11px;fill:#94a3b8}.leg-text{font-size:12px;fill:#334155}</style>
<rect width="760" height="520" fill="#f8fafc" rx="10"/>
<rect x="1" y="1" width="758" height="518" fill="none" stroke="#e2e8f0" stroke-width="1" rx="10"/>
<text class="title" x="68" y="22">Average Runtime and Token Use</text>
<rect x="68" y="32" width="12" height="12" rx="3" fill="#0d9488"/>
<text class="leg-text" x="85" y="43">Multi-agent</text>
<rect x="186" y="32" width="12" height="12" rx="3" fill="#7c3aed"/>
<text class="leg-text" x="203" y="43">Blind multi-agent</text>
<line class="grid" x1="68" y1="432.0" x2="736" y2="432.0"/>
<text class="ylbl" x="62" y="436.0" text-anchor="end">0</text>
<line class="grid" x1="68" y1="340.0" x2="736" y2="340.0"/>
<text class="ylbl" x="62" y="344.0" text-anchor="end">5</text>
<line class="grid" x1="68" y1="248.0" x2="736" y2="248.0"/>
<text class="ylbl" x="62" y="252.0" text-anchor="end">10</text>
<line class="grid" x1="68" y1="156.0" x2="736" y2="156.0"/>
<text class="ylbl" x="62" y="160.0" text-anchor="end">15</text>
